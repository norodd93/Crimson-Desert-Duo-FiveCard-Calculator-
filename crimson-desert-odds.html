<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crimson Desert Odds Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: linear-gradient(170deg, #1a1410 0%, #2a2018 40%, #1a1410 100%);
    color: #d4c4a0;
    font-family: 'Cinzel', serif;
    padding: 16px;
  }

  /* ── Tab switcher ── */
  .tab-bar {
    display: flex; border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(201,164,74,0.25); margin-bottom: 18px;
  }
  .tab-btn {
    flex: 1; padding: 10px 4px; border: none; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
    letter-spacing: 1px; transition: all 0.2s ease;
    background: rgba(255,255,255,0.03); color: #6b5a3a;
  }
  .tab-btn.active {
    background: linear-gradient(180deg, rgba(201,164,74,0.2), rgba(201,164,74,0.1));
    color: #e8d48a;
  }
  .tab-separator { width: 1px; background: rgba(201,164,74,0.2); }

  /* ── Shared header ── */
  h1 {
    font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px;
    background: linear-gradient(90deg, #c9a44a, #e8d48a, #c9a44a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 2px;
  }
  .subtitle { text-align: center; font-size: 11px; color: #8a7a5a; margin-bottom: 16px; letter-spacing: 1px; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, #c9a44a44, transparent); margin-bottom: 16px; }

  /* ── Shared components ── */
  .card-section {
    background: rgba(255,255,255,0.03); border-radius: 12px; padding: 14px;
    margin-bottom: 14px; border: 1px solid rgba(201,164,74,0.15);
  }
  .section-title { font-size: 13px; font-weight: 700; color: #c9a44a; margin-bottom: 10px; letter-spacing: 1px; }
  .card-label { font-size: 13px; color: #b8a07a; margin-bottom: 4px; letter-spacing: 1px; }
  .num-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .num-btn {
    width: 34px; height: 34px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.08); color: #d4c4a0;
    font-weight: 400; font-size: 14px; cursor: pointer;
    font-family: 'Cinzel', serif; transition: all 0.15s ease;
  }
  .num-btn.active { background: #c9a44a; color: #1a1410; font-weight: 700; }
  .color-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .color-btn {
    padding: 4px 14px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.08); color: #d4c4a0;
    font-size: 13px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: 400;
  }
  .color-btn.red-active    { background: #a62626; color: #fff; font-weight: 700; }
  .color-btn.yellow-active { background: #b89828; color: #1a1410; font-weight: 700; }
  .hand-display {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(201,164,74,0.12); border: 1px solid rgba(201,164,74,0.25);
    font-size: 15px; font-weight: 700; color: #e8d48a; text-align: center;
  }
  .bust-display {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(138,38,38,0.15); border: 1px solid rgba(138,38,38,0.3);
    font-size: 15px; font-weight: 700; color: #f87171; text-align: center;
  }
  .opp-btn {
    padding: 3px 10px; border-radius: 6px; background: transparent;
    font-size: 12px; cursor: pointer; font-family: 'Cinzel', serif;
  }
  .opp-add    { border: 1px solid rgba(201,164,74,0.3); color: #c9a44a; }
  .opp-remove { border: 1px solid rgba(138,38,38,0.4);  color: #a65555; }
  .odds-bar { display: flex; height: 28px; border-radius: 8px; overflow: hidden; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.1); }
  .odds-win     { background: linear-gradient(180deg, #2d8a4e, #1e6b38); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; }
  .odds-tie     { background: linear-gradient(180deg, #6b6b3a, #4a4a28); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #ddd; font-weight: 700; }
  .odds-rematch { background: linear-gradient(180deg, #5a5a8a, #3e3e6b); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #ddd; font-weight: 700; }
  .odds-lose    { background: linear-gradient(180deg, #8a2626, #6b1e1e); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; }
  .odds-legend  { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; margin-bottom: 8px; }
  .detail-btn {
    background: transparent; border: 1px solid rgba(201,164,74,0.2);
    color: #8a7a5a; font-size: 11px; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; font-family: 'Cinzel', serif; margin-top: 6px;
  }
  .detail-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 8px; }
  .detail-table th { text-align: left; padding: 4px 6px; color: #8a7a5a; font-weight: 600; border-bottom: 1px solid rgba(201,164,74,0.15); }
  .detail-table th:last-child { text-align: center; }
  .detail-table td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .detail-table td:last-child { text-align: center; font-weight: 700; font-size: 13px; }
  .detail-wrap { max-height: 300px; overflow-y: auto; }
  .vs-label { font-size: 13px; color: #b8a07a; margin-bottom: 6px; font-weight: 600; }
  .advice {
    margin-top: 12px; text-align: center; padding: 10px 14px;
    border-radius: 8px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
  }
  .combined-label { font-size: 13px; color: #e8d48a; margin-bottom: 6px; font-weight: 700; }
  .combined-divider { height: 1px; background: linear-gradient(90deg, transparent, #c9a44a33, transparent); margin-bottom: 10px; margin-top: 8px; }
  .card-divider { height: 1px; background: rgba(201,164,74,0.08); margin: 4px 0 12px; }

  /* Five-Card specific */
  .grouping-display {
    margin-top: 6px; padding: 7px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(201,164,74,0.12);
    font-size: 12px; color: #b8a07a; text-align: center;
  }
  .grouping-row {
    padding: 6px 10px; border-radius: 6px; margin-top: 4px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(201,164,74,0.1);
    font-size: 12px; color: #8a7a5a;
  }
  .grouping-row.best { border-color: rgba(201,164,74,0.3); color: #b8a07a; }
  .card-chip {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 12px; font-weight: 700; margin: 1px;
  }
  .card-chip.red    { background: rgba(166,38,38,0.3);  color: #d46b6b; border: 1px solid rgba(166,38,38,0.4); }
  .card-chip.yellow { background: rgba(184,152,40,0.2); color: #d4c470; border: 1px solid rgba(184,152,40,0.3); }

  /* View toggling */
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<!-- Tab switcher -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-duo" onclick="switchTab('duo')">DUO</button>
  <div class="tab-separator"></div>
  <button class="tab-btn" id="tab-fc" onclick="switchTab('fc')">FIVE-CARD</button>
</div>

<!-- DUO VIEW -->
<div class="view active" id="view-duo">
  <h1>DUO ODDS</h1>
  <p class="subtitle">CRIMSON DESERT CARD GAME CALCULATOR</p>
  <div class="divider"></div>
  <div id="duo-app"></div>
</div>

<!-- FIVE-CARD VIEW -->
<div class="view" id="view-fc">
  <h1>FIVE-CARD ODDS</h1>
  <p class="subtitle">CRIMSON DESERT CARD GAME CALCULATOR</p>
  <div class="divider"></div>
  <div id="fc-app"></div>
</div>

<div style="height:40px"></div>

<script>
// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ─────────────────────────────────────────────
// DUO CALCULATOR
// ─────────────────────────────────────────────
(function() {
  const ALL_CARDS = [];
  for (let n = 1; n <= 10; n++) {
    ALL_CARDS.push({ number: n, color: "red" });
    ALL_CARDS.push({ number: n, color: "yellow" });
  }

  function evaluateHand(c1, c2) {
    const nums = [c1.number, c2.number].sort((a, b) => a - b);
    const bothRed = c1.color === "red" && c2.color === "red";
    const sum = (c1.number + c2.number) % 10;
    if (nums[0] === 3 && nums[1] === 8 && bothRed) return { type: "prime_pair",    rank: 100, label: "Prime Pair",    fallback: sum };
    if (bothRed && nums[0] === 1 && (nums[1] === 3 || nums[1] === 8)) return { type: "superior_pair", rank: 90, label: "Superior Pair", fallback: sum };
    if (nums[0] === 10 && nums[1] === 10) return { type: "ten_pair",    rank: 80,  label: "Ten Pair",    fallback: sum };
    if (nums[0] === 4 && nums[1] === 9 && bothRed) return { type: "high_warden", rank: -1, label: "High Warden", fallback: 3 };
    if (nums[0] === 4 && nums[1] === 7 && bothRed) return { type: "executor",    rank: -1, label: "Executor",    fallback: 1 };
    if (nums[0] === 4 && nums[1] === 9) return { type: "warden", rank: -1, label: "Warden", fallback: 3 };
    if (nums[0] === 3 && nums[1] === 7) return { type: "judge",  rank: -2, label: "Judge",  fallback: 0 };
    if (nums[0] === nums[1]) return { type: "pair", rank: 70 + nums[0], label: "Pair of " + nums[0] + "s", fallback: sum };
    if (nums[0] === 1 && nums[1] === 2)  return { type: "one_two",   rank: 60, label: "One-two",   fallback: sum };
    if (nums[0] === 1 && nums[1] === 4)  return { type: "one_four",  rank: 59, label: "One-four",  fallback: sum };
    if (nums[0] === 1 && nums[1] === 9)  return { type: "one_nine",  rank: 58, label: "One-nine",  fallback: sum };
    if (nums[0] === 1 && nums[1] === 10) return { type: "one_ten",   rank: 57, label: "One-ten",   fallback: sum };
    if (nums[0] === 4 && nums[1] === 10) return { type: "four_ten",  rank: 56, label: "Four-ten",  fallback: sum };
    if (nums[0] === 4 && nums[1] === 6)  return { type: "four_six",  rank: 55, label: "Four-six",  fallback: sum };
    if (sum === 9) return { type: "perfect_nine", rank: 50, label: "Perfect Nine", fallback: 9 };
    if (sum === 0) return { type: "zero",         rank: 0,  label: "Zero",         fallback: 0 };
    return { type: "points", rank: sum, label: sum + " Points", fallback: sum };
  }

  function compareHands(my, opp) {
    if (my.type === "executor") {
      if (opp.type === "superior_pair") return "win";
      if (opp.type === "prime_pair")    return "lose";
      if (opp.type === "executor")      return "tie";
      if (opp.type === "high_warden" || opp.type === "warden") return "rematch";
      var oppEff = opp.type === "judge" ? 0 : opp.rank;
      return my.fallback > oppEff ? "win" : my.fallback < oppEff ? "lose" : "tie";
    }
    if (opp.type === "executor") {
      if (my.type === "superior_pair") return "lose";
      if (my.type === "prime_pair")    return "win";
      if (my.type === "warden" || my.type === "high_warden") return "rematch";
      var myEff = my.type === "judge" ? 0 : my.rank;
      return myEff > opp.fallback ? "win" : myEff < opp.fallback ? "lose" : "tie";
    }
    if (my.type === "judge") {
      if (opp.type === "pair") return "win";
      if (opp.type === "ten_pair" || opp.type === "superior_pair" || opp.type === "prime_pair") return "lose";
      if (opp.type === "judge") return "tie";
      if (opp.type === "warden" || opp.type === "high_warden") return "rematch";
      return 0 > opp.rank ? "win" : 0 < opp.rank ? "lose" : "tie";
    }
    if (opp.type === "judge") {
      if (my.type === "pair") return "lose";
      if (my.type === "ten_pair" || my.type === "superior_pair" || my.type === "prime_pair") return "win";
      if (my.type === "warden" || my.type === "high_warden") return "rematch";
      return my.rank > 0 ? "win" : my.rank < 0 ? "lose" : "tie";
    }
    if (my.type === "high_warden") {
      if (opp.type === "prime_pair" || opp.type === "superior_pair" || opp.type === "ten_pair") return "lose";
      return "rematch";
    }
    if (opp.type === "high_warden") {
      if (my.type === "prime_pair" || my.type === "superior_pair" || my.type === "ten_pair") return "win";
      return "rematch";
    }
    if (my.type === "warden") {
      if (opp.type === "prime_pair" || opp.type === "superior_pair" || opp.type === "ten_pair") return "lose";
      if (opp.type === "pair") return my.fallback > opp.fallback ? "win" : my.fallback < opp.fallback ? "lose" : "tie";
      if (opp.rank >= 60) return my.fallback > opp.rank ? "win" : my.fallback < opp.rank ? "lose" : "tie";
      return "rematch";
    }
    if (opp.type === "warden") {
      if (my.type === "prime_pair" || my.type === "superior_pair" || my.type === "ten_pair") return "win";
      if (my.type === "pair") return my.fallback > opp.fallback ? "win" : my.fallback < opp.fallback ? "lose" : "tie";
      if (my.rank >= 60) return my.rank > opp.fallback ? "win" : my.rank < opp.fallback ? "lose" : "tie";
      return "rematch";
    }
    return my.rank > opp.rank ? "win" : my.rank < opp.rank ? "lose" : "tie";
  }

  var duoState = {
    myCard1: { number: null, color: null },
    myCard2: { number: null, color: null },
    oppCards: [{ number: null, color: null }],
    showDetails: {}
  };

  function resultColor(r) {
    if (r === "win")  return "#4ade80";
    if (r === "lose") return "#f87171";
    if (r === "tie")  return "#d4d480";
    return "#9898d4";
  }
  function resultEmoji(r) {
    if (r === "win")  return "✓";
    if (r === "lose") return "✗";
    if (r === "tie")  return "=";
    return "↻";
  }

  function cardSelector(card, keyPrefix, label) {
    let html = '<div style="margin-bottom:12px">';
    html += '<div class="card-label">' + label + '</div>';
    html += '<div class="num-row">';
    for (let n = 1; n <= 10; n++) {
      const active = card.number === n ? " active" : "";
      html += '<button class="num-btn' + active + '" onclick="duoSelectNum(\'' + keyPrefix + '\',' + n + ')">' + n + '</button>';
    }
    html += '</div><div class="color-row">';
    const rA = card.color === "red"    ? " red-active"    : "";
    const yA = card.color === "yellow" ? " yellow-active" : "";
    html += '<button class="color-btn' + rA + '" onclick="duoSelectColor(\'' + keyPrefix + '\',\'red\')">Red</button>';
    html += '<button class="color-btn' + yA + '" onclick="duoSelectColor(\'' + keyPrefix + '\',\'yellow\')">Yellow</button>';
    html += '</div></div>';
    return html;
  }

  function oddsBar(wins, losses, ties, rematches, total) {
    const wP = ((wins     / total) * 100).toFixed(1);
    const lP = ((losses   / total) * 100).toFixed(1);
    const tP = ((ties     / total) * 100).toFixed(1);
    const rP = ((rematches/ total) * 100).toFixed(1);
    let html = '<div class="odds-bar">';
    if (wins     > 0) html += '<div class="odds-win"     style="width:' + wP + '%">' + (parseFloat(wP) > 8 ? wP + '%' : '') + '</div>';
    if (ties     > 0) html += '<div class="odds-tie"     style="width:' + tP + '%">' + (parseFloat(tP) > 8 ? tP + '%' : '') + '</div>';
    if (rematches> 0) html += '<div class="odds-rematch" style="width:' + rP + '%">' + (parseFloat(rP) > 8 ? rP + '%' : '') + '</div>';
    if (losses   > 0) html += '<div class="odds-lose"    style="width:' + lP + '%">' + (parseFloat(lP) > 8 ? lP + '%' : '') + '</div>';
    html += '</div>';
    html += '<div class="odds-legend">';
    html += '<span style="color:#4ade80">Win ' + wP + '%</span>';
    html += '<span style="color:#d4d480">Tie ' + tP + '%</span>';
    html += '<span style="color:#9898d4">Rematch ' + rP + '%</span>';
    html += '<span style="color:#f87171">Lose ' + lP + '%</span>';
    html += '</div>';
    return html;
  }

  function duoRender() {
    const app = document.getElementById("duo-app");
    let html = '';

    html += '<div class="card-section">';
    html += '<div class="section-title">YOUR HAND</div>';
    html += cardSelector(duoState.myCard1, "my1", "Card 1");
    html += cardSelector(duoState.myCard2, "my2", "Card 2");
    const myValid = duoState.myCard1.number && duoState.myCard1.color && duoState.myCard2.number && duoState.myCard2.color;
    const myHand  = myValid ? evaluateHand(duoState.myCard1, duoState.myCard2) : null;
    if (myHand) html += '<div class="hand-display">' + myHand.label + '</div>';
    html += '</div>';

    html += '<div class="card-section">';
    html += '<div class="opp-header"><div class="section-title" style="margin-bottom:0">OPPONENTS</div><div style="display:flex;gap:6px">';
    if (duoState.oppCards.length < 3) html += '<button class="opp-btn opp-add" onclick="duoAddOpp()">+ Add</button>';
    if (duoState.oppCards.length > 1) html += '<button class="opp-btn opp-remove" onclick="duoRemoveOpp()">− Remove</button>';
    html += '</div></div>';
    duoState.oppCards.forEach(function(opp, i) {
      html += cardSelector(opp, "opp" + i, "Opponent " + (i + 1) + " — Visible Card");
    });
    html += '</div>';

    if (myHand) {
      const oppResults = duoState.oppCards.map(function(opp) {
        if (!opp.number || !opp.color) return null;
        let wins = 0, losses = 0, ties = 0, rematches = 0;
        const details = [];
        ALL_CARDS.forEach(function(unk) {
          const oppHand = evaluateHand(opp, unk);
          const result  = compareHands(myHand, oppHand);
          if (result === "win")       wins++;
          else if (result === "lose") losses++;
          else if (result === "tie")  ties++;
          else                        rematches++;
          details.push({ card: unk, oppHand: oppHand, result: result });
        });
        return { wins, losses, ties, rematches, total: 20, details };
      });

      const hasResults = oppResults.some(function(r) { return r; });
      if (hasResults) {
        html += '<div class="card-section">';
        html += '<div class="section-title">RESULTS</div>';

        oppResults.forEach(function(r, i) {
          if (!r) {
            html += '<div style="font-size:12px;color:#6b5a3a;margin-bottom:8px">Select opponent ' + (i+1) + '\'s card</div>';
            return;
          }
          html += '<div style="margin-bottom:14px">';
          html += '<div class="vs-label">vs Opponent ' + (i + 1) + '</div>';
          html += oddsBar(r.wins, r.losses, r.ties, r.rematches, r.total);
          html += '<button class="detail-btn" onclick="duoToggleDetails(' + i + ')">' + (duoState.showDetails[i] ? "Hide" : "Show") + ' Details</button>';
          if (duoState.showDetails[i]) {
            html += '<div class="detail-wrap"><table class="detail-table"><thead><tr><th>2nd Card</th><th>Their Hand</th><th style="text-align:center">Result</th></tr></thead><tbody>';
            r.details.forEach(function(d) {
              const cColor = d.card.color === "red" ? "#d46b6b" : "#d4c470";
              const cLabel = (d.card.color === "red" ? "R" : "Y") + d.card.number;
              html += '<tr><td><span style="color:' + cColor + '">' + cLabel + '</span></td>';
              html += '<td style="color:#b8a07a">' + d.oppHand.label + '</td>';
              html += '<td><span style="color:' + resultColor(d.result) + '">' + resultEmoji(d.result) + '</span></td></tr>';
            });
            html += '</tbody></table></div>';
          }
          html += '</div>';
        });

        const validOpps = duoState.oppCards.filter(function(o) { return o.number && o.color; });
        if (validOpps.length >= 2) {
          // Exact enumeration: 20^N combinations (max 20^4 = 160k, fine)
          let cW = 0, cL = 0, cT = 0, cM = 0;
          function enumerate(oppIdx, results) {
            if (oppIdx === validOpps.length) {
              const beatAll  = results.every(function(r) { return r === "win"; });
              const lostAny  = results.some(function(r)  { return r === "lose"; });
              const remAny   = results.some(function(r)  { return r === "rematch"; });
              const tieAll   = results.every(function(r) { return r === "tie"; });
              if (beatAll)      cW++;
              else if (lostAny) cL++;
              else if (tieAll)  cT++;
              else              cM++;
              return;
            }
            ALL_CARDS.forEach(function(unk) {
              const h = evaluateHand(validOpps[oppIdx], unk);
              enumerate(oppIdx + 1, results.concat(compareHands(myHand, h)));
            });
          }
          enumerate(0, []);
          const cTotal = Math.pow(20, validOpps.length);
          html += '<div class="combined-divider"></div>';
          html += '<div class="combined-label">COMBINED (beat all ' + validOpps.length + ')</div>';
          html += oddsBar(cW, cL, cT, cM, cTotal);
        }

        // Advice — based on combined if 2+ opps filled, otherwise single opp
        const advSrc = (function() {
          if (validOpps.length >= 2) {
            let cW = 0, cL = 0;
            function enumAdv(oppIdx, results) {
              if (oppIdx === validOpps.length) {
                if (results.every(function(r) { return r === "win"; }))        cW++;
                else if (results.some(function(r) { return r === "lose"; }))   cL++;
                return;
              }
              ALL_CARDS.forEach(function(unk) {
                enumAdv(oppIdx + 1, results.concat(compareHands(myHand, evaluateHand(validOpps[oppIdx], unk))));
              });
            }
            enumAdv(0, []);
            return { wins: cW, losses: cL, total: Math.pow(20, validOpps.length) };
          }
          return oppResults.find(function(r) { return r; }) || null;
        })();

        if (advSrc) {
          const winRate  = advSrc.wins   / advSrc.total;
          const loseRate = advSrc.losses / advSrc.total;
          let advice, advColor;
          if      (winRate  >= 0.7)  { advice = "BET BIG";        advColor = "#4ade80"; }
          else if (winRate  >= 0.5)  { advice = "BET MODERATE";   advColor = "#a8d44a"; }
          else if (winRate  >= 0.35) { advice = "BET CAUTIOUS";   advColor = "#d4c470"; }
          else if (loseRate >= 0.7)  { advice = "FOLD / MIN BET"; advColor = "#f87171"; }
          else                       { advice = "PLAY SAFE";      advColor = "#d4a04a"; }
          html += '<div class="advice" style="border:1px solid ' + advColor + '33;background:' + advColor + '11;color:' + advColor + '">' + advice + '</div>';
        }
        html += '</div>';
      }
    }

    app.innerHTML = html;
  }

  window.duoSelectNum = function(key, n) {
    if      (key === "my1") duoState.myCard1.number = n;
    else if (key === "my2") duoState.myCard2.number = n;
    else duoState.oppCards[parseInt(key.replace("opp", ""))].number = n;
    duoRender();
  };
  window.duoSelectColor = function(key, c) {
    if      (key === "my1") duoState.myCard1.color = c;
    else if (key === "my2") duoState.myCard2.color = c;
    else duoState.oppCards[parseInt(key.replace("opp", ""))].color = c;
    duoRender();
  };
  window.duoAddOpp = function() {
    if (duoState.oppCards.length < 3) { duoState.oppCards.push({ number: null, color: null }); duoRender(); }
  };
  window.duoRemoveOpp = function() {
    if (duoState.oppCards.length > 1) { duoState.oppCards.pop(); delete duoState.showDetails[1]; duoRender(); }
  };
  window.duoToggleDetails = function(idx) {
    duoState.showDetails[idx] = !duoState.showDetails[idx]; duoRender();
  };

  duoRender();
})();


// ─────────────────────────────────────────────
// FIVE-CARD CALCULATOR
// ─────────────────────────────────────────────
(function() {
  const FULL_DECK = [];
  for (let n = 1; n <= 10; n++) {
    for (const c of ["red", "yellow"]) {
      FULL_DECK.push({number: n, color: c});
      FULL_DECK.push({number: n, color: c});
    }
  }

  function evaluateHand(c1, c2) {
    const nums = [c1.number, c2.number].sort((a, b) => a - b);
    const sum  = (c1.number + c2.number) % 10;
    if (nums[0] === 10 && nums[1] === 10) return { rank: 80, label: "Ten Pair" };
    if (nums[0] === nums[1]) {
      return { rank: 70 + nums[0], label: nums[0] === 1 ? "One Pair" : "Pair of " + nums[0] + "s" };
    }
    if (sum === 9) return { rank: 50, label: "Perfect Nine" };
    if (sum === 0) return { rank: 0,  label: "Zero" };
    return { rank: sum, label: sum + " Points" };
  }

  function findBestHand(cards) {
    const groupings = [];
    for (let i = 0; i < 5; i++) for (let j = i+1; j < 5; j++) for (let k = j+1; k < 5; k++) {
      const trio    = [cards[i], cards[j], cards[k]];
      const trioSum = trio[0].number + trio[1].number + trio[2].number;
      if (trioSum === 10 || trioSum === 20 || trioSum === 30) {
        const rem  = cards.filter((_, idx) => idx !== i && idx !== j && idx !== k);
        const hand = evaluateHand(rem[0], rem[1]);
        groupings.push({ trio, remaining: rem, hand, sum: trioSum });
      }
    }
    if (groupings.length === 0) return { rank: -1, label: "Bust", groupings: [] };
    groupings.sort((a, b) => b.hand.rank - a.hand.rank);
    return { rank: groupings[0].hand.rank, label: groupings[0].hand.label, groupings };
  }

  function compareHands(my, opp) {
    return my.rank > opp.rank ? "win" : my.rank < opp.rank ? "lose" : "tie";
  }

  function getRemainingDeck(knownCards) {
    const deck = FULL_DECK.slice();
    for (const card of knownCards) {
      if (!card || !card.number || !card.color) continue;
      const idx = deck.findIndex(c => c.number === card.number && c.color === card.color);
      if (idx !== -1) deck.splice(idx, 1);
    }
    return deck;
  }

  function chipHtml(c) {
    return '<span class="card-chip ' + (c.color === "red" ? "red" : "yellow") + '">' + (c.color === "red" ? "R" : "Y") + c.number + '</span>';
  }

  var fcState = {
    myCards: Array.from({length: 5}, function() { return { number: null, color: null }; }),
    oppCards: [{ number: null, color: null }],
    showGroupings: false
  };

  const MAX_OPPS = 3;
  const MC_SAMPLES = 6000;

  function cardSelector(card, keyPrefix, label) {
    let html = '<div style="margin-bottom:10px">';
    html += '<div class="card-label">' + label + '</div>';
    html += '<div class="num-row">';
    for (let n = 1; n <= 10; n++) {
      const active = card.number === n ? " active" : "";
      html += '<button class="num-btn' + active + '" onclick="fcSelectNum(\'' + keyPrefix + '\',' + n + ')">' + n + '</button>';
    }
    html += '</div><div class="color-row">';
    const rA = card.color === "red"    ? " red-active"    : "";
    const yA = card.color === "yellow" ? " yellow-active" : "";
    html += '<button class="color-btn' + rA + '" onclick="fcSelectColor(\'' + keyPrefix + '\',\'red\')">Red</button>';
    html += '<button class="color-btn' + yA + '" onclick="fcSelectColor(\'' + keyPrefix + '\',\'yellow\')">Yellow</button>';
    html += '</div></div>';
    return html;
  }

  function oddsBar(wins, losses, ties, total) {
    const wP = ((wins  / total) * 100).toFixed(1);
    const lP = ((losses/ total) * 100).toFixed(1);
    const tP = ((ties  / total) * 100).toFixed(1);
    let html = '<div class="odds-bar">';
    if (wins  > 0) html += '<div class="odds-win"  style="width:' + wP + '%">' + (parseFloat(wP) > 8 ? wP + '%' : '') + '</div>';
    if (ties  > 0) html += '<div class="odds-tie"  style="width:' + tP + '%">' + (parseFloat(tP) > 8 ? tP + '%' : '') + '</div>';
    if (losses> 0) html += '<div class="odds-lose" style="width:' + lP + '%">' + (parseFloat(lP) > 8 ? lP + '%' : '') + '</div>';
    html += '</div>';
    html += '<div class="odds-legend">';
    html += '<span style="color:#4ade80">Win ' + wP + '%</span>';
    html += '<span style="color:#d4d480">Tie ' + tP + '%</span>';
    html += '<span style="color:#f87171">Lose ' + lP + '%</span>';
    html += '</div>';
    return html;
  }

  function simulateOneOpponent(myHand, visibleCard, deck) {
    const rem = deck.slice(), remLen = rem.length;
    let wins = 0, losses = 0, ties = 0, total = 0;
    for (let a = 0; a < remLen; a++)
      for (let b = a+1; b < remLen; b++)
        for (let c = b+1; c < remLen; c++)
          for (let d = c+1; d < remLen; d++) {
            const oppHand = findBestHand([visibleCard, rem[a], rem[b], rem[c], rem[d]]);
            const result  = compareHands(myHand, oppHand);
            if (result === "win")       wins++;
            else if (result === "lose") losses++;
            else                        ties++;
            total++;
          }
    return { wins, losses, ties, total };
  }

  function draw4(deck) {
    const d = deck.slice(), hand = [];
    for (let i = 0; i < 4; i++) {
      const idx = Math.floor(Math.random() * (d.length - i)) + i;
      const tmp = d[i]; d[i] = d[idx]; d[idx] = tmp;
      hand.push(d[i]);
    }
    return hand;
  }

  function simulateCombined(myHand, validOpps) {
    let wins = 0, losses = 0, ties = 0;
    for (let s = 0; s < MC_SAMPLES; s++) {
      let beatAll = true, lostAny = false;
      for (const opp of validOpps) {
        const deck   = getRemainingDeck(fcState.myCards.concat([opp]));
        const hidden = draw4(deck);
        const result = compareHands(myHand, findBestHand([opp].concat(hidden)));
        if (result !== "win")  beatAll = false;
        if (result === "lose") lostAny = true;
      }
      if (beatAll)      wins++;
      else if (lostAny) losses++;
      else              ties++;
    }
    return { wins, losses, ties, total: MC_SAMPLES };
  }

  function adviceHtml(wins, losses, total) {
    const winRate  = wins   / total;
    const loseRate = losses / total;
    let advice, advColor;
    if      (winRate  >= 0.7)  { advice = "BET BIG";        advColor = "#4ade80"; }
    else if (winRate  >= 0.5)  { advice = "BET MODERATE";   advColor = "#a8d44a"; }
    else if (winRate  >= 0.35) { advice = "BET CAUTIOUS";   advColor = "#d4c470"; }
    else if (loseRate >= 0.7)  { advice = "FOLD / MIN BET"; advColor = "#f87171"; }
    else                       { advice = "PLAY SAFE";      advColor = "#d4a04a"; }
    return '<div class="advice" style="border:1px solid ' + advColor + '33;background:' + advColor + '11;color:' + advColor + '">' + advice + '</div>';
  }

  function fcRender() {
    const app = document.getElementById("fc-app");
    let html = '';

    // YOUR HAND
    html += '<div class="card-section">';
    html += '<div class="section-title">YOUR HAND (5 CARDS)</div>';
    for (let i = 0; i < 5; i++) {
      if (i > 0) html += '<div class="card-divider"></div>';
      html += cardSelector(fcState.myCards[i], "my" + i, "Card " + (i + 1));
    }

    const myValid = fcState.myCards.every(function(c) { return c.number && c.color; });
    let myHand = null;

    if (myValid) {
      myHand = findBestHand(fcState.myCards);
      if (myHand.rank === -1) {
        html += '<div class="bust-display">BUST — No valid grouping</div>';
        myHand = null;
      } else {
        html += '<div class="hand-display">' + myHand.label + '</div>';
        const best = myHand.groupings[0];
        html += '<div class="grouping-display">Group: ' + best.trio.map(chipHtml).join('') + ' (' + best.sum + ') &nbsp;→&nbsp; Hand: ' + best.remaining.map(chipHtml).join('') + '</div>';
        if (myHand.groupings.length > 1) {
          html += '<button class="detail-btn" onclick="fcToggleGroupings()">' + (fcState.showGroupings ? 'Hide' : 'Show all') + ' groupings (' + myHand.groupings.length + ')</button>';
          if (fcState.showGroupings) {
            myHand.groupings.forEach(function(g, gi) {
              html += '<div class="grouping-row' + (gi === 0 ? ' best' : '') + '">';
              html += g.trio.map(chipHtml).join('') + ' (' + g.sum + ') → ' + g.remaining.map(chipHtml).join('');
              html += ' = <strong style="color:#e8d48a">' + g.hand.label + '</strong>';
              if (gi === 0) html += ' <span style="color:#c9a44a">★ best</span>';
              html += '</div>';
            });
          }
        }
      }
    }
    html += '</div>';

    // OPPONENTS
    html += '<div class="card-section">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html += '<div class="section-title" style="margin-bottom:0">OPPONENTS</div>';
    html += '<div style="display:flex;gap:6px">';
    if (fcState.oppCards.length < MAX_OPPS) html += '<button class="opp-btn opp-add" onclick="fcAddOpp()">+ Add</button>';
    if (fcState.oppCards.length > 1)        html += '<button class="opp-btn opp-remove" onclick="fcRemoveOpp()">− Remove</button>';
    html += '</div></div>';
    fcState.oppCards.forEach(function(opp, i) {
      if (i > 0) html += '<div class="card-divider"></div>';
      html += cardSelector(opp, "opp" + i, "Opponent " + (i + 1) + " — Visible Card");
    });
    html += '</div>';

    // RESULTS
    if (myHand) {
      const validOpps = fcState.oppCards.filter(function(o) { return o.number && o.color; });
      if (validOpps.length > 0) {
        html += '<div class="card-section">';
        html += '<div class="section-title">RESULTS</div>';

        fcState.oppCards.forEach(function(opp, i) {
          if (!opp.number || !opp.color) {
            html += '<div style="font-size:12px;color:#6b5a3a;margin-bottom:8px">Select Opponent ' + (i+1) + '\'s visible card</div>';
            return;
          }
          const deck = getRemainingDeck(fcState.myCards.concat([opp]));
          const r    = simulateOneOpponent(myHand, opp, deck);
          html += '<div style="margin-bottom:12px">';
          html += '<div class="vs-label">vs Opponent ' + (i + 1) + '</div>';
          html += oddsBar(r.wins, r.losses, r.ties, r.total);
          html += '</div>';
        });

        if (validOpps.length >= 2) {
          const c = simulateCombined(myHand, validOpps);
          html += '<div style="height:1px;background:linear-gradient(90deg,transparent,#c9a44a33,transparent);margin-bottom:10px"></div>';
          html += '<div style="font-size:13px;color:#e8d48a;font-weight:700;margin-bottom:4px">COMBINED (beat all ' + validOpps.length + ')</div>';
          html += '<div style="font-size:10px;color:#6b5a3a;margin-bottom:6px;letter-spacing:1px">ESTIMATED · ' + MC_SAMPLES + ' SAMPLES</div>';
          html += oddsBar(c.wins, c.losses, c.ties, c.total);
          html += adviceHtml(c.wins, c.losses, c.total);
        } else {
          const r = simulateOneOpponent(myHand, validOpps[0], getRemainingDeck(fcState.myCards.concat([validOpps[0]])));
          html += adviceHtml(r.wins, r.losses, r.total);
        }

        html += '</div>';
      }
    }

    app.innerHTML = html;
  }

  window.fcSelectNum = function(key, n) {
    if (key.startsWith("my")) fcState.myCards[parseInt(key.replace("my", ""))].number = n;
    else fcState.oppCards[parseInt(key.replace("opp", ""))].number = n;
    fcRender();
  };
  window.fcSelectColor = function(key, c) {
    if (key.startsWith("my")) fcState.myCards[parseInt(key.replace("my", ""))].color = c;
    else fcState.oppCards[parseInt(key.replace("opp", ""))].color = c;
    fcRender();
  };
  window.fcAddOpp = function() {
    if (fcState.oppCards.length < 3) { fcState.oppCards.push({ number: null, color: null }); fcRender(); }
  };
  window.fcRemoveOpp = function() {
    if (fcState.oppCards.length > 1) { fcState.oppCards.pop(); fcRender(); }
  };
  window.fcToggleGroupings = function() {
    fcState.showGroupings = !fcState.showGroupings; fcRender();
  };

  fcRender();
})();
